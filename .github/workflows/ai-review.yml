name: AI Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  zhipu-review:
    name: Zhipu PR review
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Check out base repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          persist-credentials: false

      - name: Run Zhipu AI review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_MODEL: ${{ vars.ZHIPU_MODEL || 'glm-4-flash' }}
          ZHIPU_BASE_URL: ${{ vars.ZHIPU_BASE_URL || 'https://open.bigmodel.cn/api/coding/paas/v4' }}
        run: python scripts/zhipu_pr_review.py
